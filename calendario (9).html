<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="image/logo.svg">
<link rel="icon" type="image/x-icon" href="image/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  :root[data-theme="dark"]{
    --bg:#10141f;
    --panel:#1a2130;
    --panel-2:#222b3d;
    --panel-hover:#2a3448;
    --border:rgba(255,255,255,0.05);
    --border-strong:rgba(255,255,255,0.12);
    --text:#f4f6fb;
    --text-dim:#9aa5bb;
    --text-lo:#5f6b83;
    --accent:#00d68f;
    --accent-deep:#00b478;
    --accent-bright:#00e69c;
    --accent-dim:rgba(0,214,143,0.13);
    --ink-on-accent:#06261b;
    --high:#ff6b6b;
    --high-dim:rgba(255,107,107,0.14);
    --med:#f5a623;
    --med-dim:rgba(245,166,35,0.14);
    --shadow:rgba(5,8,16,0.55);
    --sans:'Manrope',-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;transition:background .25s,color .25s;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    flex-direction:column;
    min-height:100vh;
    letter-spacing:0.005em;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(0,214,143,0.3);}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:5px;border:2px solid var(--bg);}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}

  /* ── TOPBAR ── */
  .topbar{
    background:rgba(16,20,31,0.85);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
    min-height:66px;padding:16px 40px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    position:sticky;top:0;z-index:100;
    box-shadow:0 10px 30px -18px var(--shadow);
  }
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .page-title{
    font-family:var(--mono);font-size:11px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;color:var(--text-lo);
  }

  /* ── BRAND LOCKUP (cliccabile → hub.html) ── */
  .brand-lockup{
    display:flex;align-items:center;gap:13px;
    text-decoration:none;
    border-radius:12px;
    padding:2px;
    transition:opacity .16s var(--ease);
  }
  .brand-lockup:hover{opacity:.85;}
  .brand-mark{
    width:38px;height:38px;border-radius:11px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,#00e69c 0%,#00b478 100%);
    box-shadow:0 8px 20px -8px rgba(0,214,143,.55),inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .18s var(--ease);
  }
  .brand-lockup:hover .brand-mark{transform:translateY(-1px) rotate(-2deg);}
  .brand-mark svg{width:21px;height:21px;stroke:#04140d;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .brand-text{display:flex;flex-direction:column;gap:3px;line-height:1;}
  .brand-title{font-family:var(--sans);font-weight:800;font-size:16px;color:var(--text);letter-spacing:.12em;text-transform:uppercase;line-height:1;}
  .brand-title span{color:var(--accent);}
  .brand-sub{
    font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:#5f6b83;white-space:nowrap;
  }

  /* ── CONTENT ── */
  .content{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:28px 32px 48px;gap:20px;
  }
  .info-bar{
    width:100%;max-width:1000px;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:16px;
    padding:14px 18px;
    display:flex;align-items:center;gap:10px;
    font-size:13px;font-weight:600;color:var(--text-dim);
    box-shadow:0 14px 32px -24px var(--shadow);
  }
  .info-bar svg{flex-shrink:0;color:var(--accent);}
  .info-bar b{color:var(--text);font-weight:700;}

  /* ── RANGE TABS ── */
  .range-tabs{
    width:100%;max-width:1000px;
    display:flex;gap:8px;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:14px;
    padding:6px;
    box-shadow:0 14px 32px -24px var(--shadow);
  }
  .range-tab{
    flex:1;
    display:flex;align-items:center;justify-content:center;
    border:none;background:transparent;
    color:var(--text-dim);
    font-family:var(--sans);font-weight:700;font-size:13px;
    padding:10px 12px;border-radius:10px;cursor:pointer;
    transition:background .16s var(--ease),color .16s;
  }
  .range-tab:hover{color:var(--text);background:var(--panel-2);}
  .range-tab.active{
    background:var(--accent-dim);color:var(--accent-bright);
  }

  .cal-wrapper{
    width:100%;max-width:1000px;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 18px 40px -26px var(--shadow);
    display:flex;flex-direction:column;
  }
  .cal-head{
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    padding:20px 24px 14px;
    border-bottom:1px solid var(--border);
  }
  .cal-head h1{
    font-size:19px;font-weight:800;letter-spacing:.01em;
  }
  .cal-head .date{
    font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text-lo);
    text-transform:capitalize;
  }

  /* ── DAY GROUP HEADER (vista Settimana) ── */
  .day-group-head{
    padding:12px 24px 8px;
    font-family:var(--mono);font-size:11px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;color:var(--text-lo);
    background:var(--panel-2);
    border-bottom:1px solid var(--border);
    border-top:1px solid var(--border);
  }
  .day-group-head:first-child{border-top:none;}

  /* ── EVENT LIST ── */
  .events{display:flex;flex-direction:column;}
  .event{
    display:grid;
    grid-template-columns:66px 1fr auto;
    align-items:center;gap:16px;
    padding:15px 24px;
    border-bottom:1px solid var(--border);
    transition:background .16s var(--ease);
  }
  .event:last-child{border-bottom:none;}
  .event:hover{background:var(--panel-2);}

  .ev-time{
    font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text);
    display:flex;flex-direction:column;gap:3px;
  }
  .ev-impact{
    display:inline-flex;align-items:center;gap:5px;
    font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;
  }
  .ev-impact .dot{width:6px;height:6px;border-radius:50%;}
  .ev-impact.high{color:var(--high);}
  .ev-impact.high .dot{background:var(--high);box-shadow:0 0 8px var(--high);}
  .ev-impact.med{color:var(--med);}
  .ev-impact.med .dot{background:var(--med);}

  .ev-title{
    font-size:14.5px;font-weight:600;color:var(--text);line-height:1.35;
  }
  .ev-tag{
    display:inline-block;margin-top:4px;
    font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--accent);
    background:var(--accent-dim);padding:2px 7px;border-radius:5px;
  }

  .ev-data{display:flex;gap:18px;text-align:right;}
  .ev-cell{display:flex;flex-direction:column;gap:3px;min-width:56px;}
  .ev-cell .lbl{
    font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.09em;
    text-transform:uppercase;color:var(--text-lo);
  }
  .ev-cell .val{
    font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text-dim);
  }
  .ev-cell.actual .val{color:var(--accent-bright);}
  .ev-cell .val.empty{color:var(--text-lo);}

  /* stati temporali */
  .event.past{opacity:.42;}
  .event.next{
    background:linear-gradient(90deg,var(--accent-dim),transparent 70%);
    box-shadow:inset 3px 0 0 var(--accent);
  }
  .event.next:hover{background:linear-gradient(90deg,var(--accent-dim),transparent 60%);}

  /* stati vuoto / loading / errore */
  .state{
    padding:56px 24px;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:12px;
  }
  .state svg{color:var(--text-lo);}
  .state h2{font-size:16px;font-weight:700;color:var(--text);}
  .state p{font-size:13px;color:var(--text-dim);max-width:360px;line-height:1.5;}
  .state.error svg{color:var(--high);}
  .spinner{
    width:26px;height:26px;border-radius:50%;
    border:2.5px solid var(--border-strong);border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .retry-btn{
    margin-top:4px;border:1px solid var(--border-strong);background:var(--panel-2);
    color:var(--text);font-family:var(--sans);font-weight:700;font-size:12px;
    padding:8px 16px;border-radius:999px;cursor:pointer;
    transition:background .16s,transform .12s var(--ease);
  }
  .retry-btn:hover{background:var(--panel-hover);transform:translateY(-1px);}

  .cal-footer{
    padding:11px 24px;border-top:1px solid var(--border);
    font-size:11px;color:var(--text-lo);
    font-family:var(--mono);letter-spacing:.04em;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }

  @media(max-width:640px){
    .topbar{padding:14px 20px;min-height:0;}
    .content{padding:16px 12px 32px;}
    .cal-wrapper{border-radius:16px;}
    .event{grid-template-columns:56px 1fr;row-gap:10px;padding:14px 16px;}
    .ev-data{grid-column:1 / -1;justify-content:flex-start;gap:22px;text-align:left;}
    .ev-cell{align-items:flex-start;}
    .cal-head{padding:16px 16px 12px;}
    .range-tab{font-size:12px;padding:9px 8px;}
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a class="brand-lockup" href="hub.html" aria-label="Torna alla Hub">
      <div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 15l4-5 4 3 5-7"/><path d="M14 6h5v5"/></svg></div>
      <div class="brand-text"><div class="brand-title">GB <span>SUITE</span></div><div class="brand-sub">Trading hub</div></div>
    </a>
  </div>
  <div class="topbar-right">
    <span class="page-title">Calendario Economico</span>
  </div>
</header>

<div class="content">
  <div class="info-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Eventi macro <b>USA ad alto impatto</b> — Orari in ora italiana.
  </div>

  <div class="range-tabs" role="tablist" aria-label="Seleziona periodo">
    <button class="range-tab" data-range="yesterday" role="tab">Ieri</button>
    <button class="range-tab active" data-range="today" role="tab" aria-selected="true">Oggi</button>
    <button class="range-tab" data-range="tomorrow" role="tab">Domani</button>
    <button class="range-tab" data-range="week" role="tab">Settimana</button>
  </div>

  <div class="cal-wrapper">
    <div class="cal-head">
      <h1 id="calTitle">Eventi di oggi</h1>
      <span class="date" id="calDate">—</span>
    </div>

    <div id="calBody">
      <!-- popolato via JS -->
      <div class="state">
        <div class="spinner"></div>
        <p>Carico gli eventi della giornata…</p>
      </div>
    </div>

    <div class="cal-footer">
      <span>Fonte: Forex Factory · filtro US high-impact</span>
      <span id="calStatus">—</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ══ CONFIG ══ */
  const SUPABASE_URL  = "https://wgyjsnvygmxfheiubfjo.supabase.co";
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndneWpzbnZ5Z214ZmhlaXViZmpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4Njg1NzQsImV4cCI6MjA5NzQ0NDU3NH0.bgb3wAgYQt6omORw47MNgW6VYVITRdj5v6R68FeXsSY";
  const FN_URL = SUPABASE_URL + "/functions/v1/us-calendar";

  /* ══ SESSION GUARD ══ */
  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  (async function () {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) window.location.replace("login.html");
  })();

  /* ══ CALENDARIO ══ */
  const body     = document.getElementById("calBody");
  const dateEl   = document.getElementById("calDate");
  const statEl   = document.getElementById("calStatus");
  const titleEl  = document.getElementById("calTitle");
  const tabs     = document.querySelectorAll(".range-tab");
  let lastEvents = [];
  let currentRange = "today";

  const RANGE_LABELS = {
    yesterday: "Eventi di ieri",
    today: "Eventi di oggi",
    tomorrow: "Eventi di domani",
    week: "Eventi della settimana",
  };

  const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  function cell(label, value, cls) {
    const v = value && value.trim() ? esc(value) : "—";
    const empty = v === "—" ? " empty" : "";
    return `<div class="ev-cell ${cls || ""}"><span class="lbl">${label}</span><span class="val${empty}">${v}</span></div>`;
  }

  function eventCard(e, now, nextIso) {
    const t = new Date(e.iso).getTime();
    const state = t < now ? "past" : (e.iso === nextIso ? "next" : "");
    const high = e.impact === "High";
    const impCls = high ? "high" : "med";
    const impTxt = high ? "Alto" : "Medio";
    const tag = e.iso === nextIso ? `<span class="ev-tag">Prossimo</span>` : "";
    return `
      <div class="event ${state}">
        <div class="ev-time">
          <span>${esc(e.time)}</span>
          <span class="ev-impact ${impCls}"><span class="dot"></span>${impTxt}</span>
        </div>
        <div>
          <div class="ev-title">${esc(e.title)}</div>${tag}
        </div>
        <div class="ev-data">
          ${cell("Prec.", e.previous, "")}
          ${cell("Cons.", e.forecast, "")}
          ${cell("Eff.", e.actual, "actual")}
        </div>
      </div>`;
  }

  function formatDayLabel(ymd) {
    return new Date(ymd + "T00:00:00").toLocaleDateString("it-IT", {
      weekday: "long", day: "numeric", month: "long",
    });
  }

  function render(events, range) {
    if (!events.length) {
      const emptyMsg = range === "week"
        ? "Settimana tranquilla sul fronte macro USA: niente dati market-mover in agenda per NQ ed ES."
        : "Giornata tranquilla sul fronte macro USA: niente dati market-mover in agenda per NQ ed ES.";
      body.innerHTML = `
        <div class="state">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 2v4M16 2v4M3 10h18"/><rect x="3" y="4" width="18" height="18" rx="2"/></svg>
          <h2>Nessun evento ad alto impatto</h2>
          <p>${esc(emptyMsg)}</p>
        </div>`;
      return;
    }

    const now = Date.now();
    const nextIso = events.find((e) => new Date(e.iso).getTime() >= now)?.iso;

    if (range === "week") {
      // raggruppa per data
      const groups = [];
      const byDate = new Map();
      for (const e of events) {
        if (!byDate.has(e.date)) { byDate.set(e.date, []); groups.push(e.date); }
        byDate.get(e.date).push(e);
      }
      body.innerHTML = groups.map((ymd) => `
        <div class="day-group-head">${esc(formatDayLabel(ymd))}</div>
        <div class="events">${byDate.get(ymd).map((e) => eventCard(e, now, nextIso)).join("")}</div>
      `).join("");
      return;
    }

    body.innerHTML = `<div class="events">${events.map((e) => eventCard(e, now, nextIso)).join("")}</div>`;
  }

  function showError() {
    body.innerHTML = `
      <div class="state error">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h2>Impossibile caricare gli eventi</h2>
        <p>La fonte dati non ha risposto. Controlla la connessione e riprova.</p>
        <button class="retry-btn" onclick="load(currentRange)">Riprova</button>
      </div>`;
  }

  async function load(range) {
    range = range || currentRange;
    currentRange = range;

    // stato attivo sui tab
    tabs.forEach((btn) => {
      const active = btn.dataset.range === range;
      btn.classList.toggle("active", active);
      btn.setAttribute("aria-selected", active ? "true" : "false");
    });

    titleEl.textContent = RANGE_LABELS[range] || "Eventi";
    body.innerHTML = `
      <div class="state">
        <div class="spinner"></div>
        <p>Carico gli eventi…</p>
      </div>`;

    try {
      const res = await fetch(FN_URL + "?range=" + encodeURIComponent(range), {
        headers: {
          "Authorization": "Bearer " + SUPABASE_ANON,
          "apikey": SUPABASE_ANON,
        },
      });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      lastEvents = data.events || [];

      if (range === "week") {
        dateEl.textContent = "Prossimi 7 giorni";
      } else {
        dateEl.textContent = data.date
          ? formatDayLabel(data.date)
          : "—";
      }
      statEl.textContent = data.count + (data.count === 1 ? " evento" : " eventi");
      render(lastEvents, range);
    } catch (err) {
      statEl.textContent = "errore";
      showError();
    }
  }

  tabs.forEach((btn) => {
    btn.addEventListener("click", () => load(btn.dataset.range));
  });

  load("today");
  // aggiorna i dati ogni 5 min; ricolora passato/prossimo ogni 30 s
  setInterval(() => load(currentRange), 5 * 60 * 1000);
  setInterval(() => { if (lastEvents.length) render(lastEvents, currentRange); }, 30 * 1000);
</script>
</body>
</html>
