<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB Suite · Calendario Economico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  :root[data-theme="dark"]{
    --bg:#0b0e11;
    --panel:#11151c;
    --panel-2:#161b24;
    --border:#222831;
    --text:#e6e9ee;
    --text-dim:#8b94a3;
    --accent:#00d9a0;
    --accent-dim:rgba(0,217,160,0.12);
    --sans:'JetBrains Mono',ui-monospace,monospace;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;transition:background .25s,color .25s;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* ── TOPBAR ── */
  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    height:56px;
    padding:0 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    position:sticky;top:0;z-index:100;
    transition:background .25s,border-color .25s;
  }
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .brand{
    display:flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:13px;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;color:var(--text);
  }
  .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .back-btn{
    display:flex;align-items:center;gap:5px;
    color:var(--text-dim);font-size:12px;text-decoration:none;
    padding:6px 10px;border-radius:7px;border:1px solid var(--border);
    background:var(--panel-2);transition:color .2s,border-color .2s;
  }
  .back-btn:hover{color:var(--accent);border-color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .page-title{
    font-family:var(--mono);font-size:11px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);
  }
  .theme-btn{
    background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);
    font-size:15px;width:34px;height:34px;border-radius:7px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s;
  }
  .theme-btn:hover{background:var(--accent-dim);border-color:var(--accent);}

  /* ── CONTENT ── */
  .content{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 32px 48px;
    gap:20px;
  }
  .info-bar{
    width:100%;max-width:1000px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 18px;
    display:flex;align-items:center;gap:10px;
    font-size:13px;color:var(--text-dim);
    transition:background .25s,border-color .25s;
  }
  .info-bar svg{flex-shrink:0;color:var(--accent);}

  .cal-wrapper{
    width:100%;
    max-width:1100px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 16px 40px -20px rgba(0,0,0,0.4);
    transition:background .25s,border-color .25s;
    flex:1;
    min-height:600px;
    display:flex;
    flex-direction:column;
  }
  .iframe-wrap{
    flex:1;
    padding:16px 24px 0 24px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:700px;
  }
  .tradingview-widget-container{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100%;
    min-height:700px;
  }
  .tradingview-widget-container__widget{
    flex:1;
    height:100% !important;
    min-height:700px;
  }
  .cal-footer{
    padding:10px 16px;
    border-top:1px solid var(--border);
    font-size:11px;color:var(--text-dim);
    font-family:var(--mono);letter-spacing:.04em;
    transition:border-color .25s;
  }

  @media(max-width:600px){
    .content{padding:16px 12px 32px;}
    .cal-wrapper{border-radius:10px;min-height:500px;}
    .iframe-wrap{padding:10px 12px 0 12px;}
    .cal-wrapper iframe{min-height:600px;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="brand"><span class="brand-dot"></span>GB Suite</div>
    <a class="back-btn" href="hub.html">← Hub</a>
  </div>
  <div class="topbar-right">
    <span class="page-title">Calendario Economico</span>
  </div>
</header>

<div class="content">
  <div class="info-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Calendario in tempo reale con eventi economici ad alta e media importanza — USA. Powered by TradingView.
  </div>

  <div class="cal-wrapper">
    <div class="iframe-wrap">
      <div class="tradingview-widget-container" style="height:100%;min-height:700px;">
        <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);min-height:700px;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
{
  "colorTheme": "dark",
  "isTransparent": true,
  "locale": "it",
  "countryFilter": "us",
  "importanceFilter": "0,1",
  "width": "100%",
  "height": "100%"
}
        </script>
      </div>
    </div>
    <div class="cal-footer">Fonte: TradingView · Dati in tempo reale</div>
  </div>
</div>
