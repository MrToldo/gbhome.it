<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GB Suite · Calendario Economico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  :root[data-theme="dark"]{
    --bg:#10141f;
    --panel:#1a2130;
    --panel-2:#222b3d;
    --panel-hover:#2a3448;
    --border:rgba(255,255,255,0.05);
    --border-strong:rgba(255,255,255,0.12);
    --text:#f4f6fb;
    --text-dim:#9aa5bb;
    --text-lo:#5f6b83;
    --accent:#00d68f;
    --accent-deep:#00b478;
    --accent-bright:#00e69c;
    --accent-dim:rgba(0,214,143,0.13);
    --ink-on-accent:#06261b;
    --shadow:rgba(5,8,16,0.55);
    --sans:'Manrope',-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;transition:background .25s,color .25s;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* ── TOPBAR ── */
  .topbar{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    height:56px;
    padding:0 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    position:sticky;top:0;z-index:100;
    transition:background .25s,border-color .25s;
  }
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .back-btn{
    display:flex;align-items:center;gap:5px;
    color:var(--text-dim);font-size:12px;text-decoration:none;
    padding:6px 10px;border-radius:7px;border:1px solid var(--border);
    background:var(--panel-2);transition:color .2s,border-color .2s;
  }
  .back-btn:hover{color:var(--accent);border-color:var(--accent);}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .page-title{
    font-family:var(--mono);font-size:11px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);
  }

  /* ── CONTENT ── */
  .content{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 32px 48px;
    gap:20px;
  }
  .info-bar{
    width:100%;max-width:1000px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 18px;
    display:flex;align-items:center;gap:10px;
    font-size:13px;color:var(--text-dim);
    transition:background .25s,border-color .25s;
  }
  .info-bar svg{flex-shrink:0;color:var(--accent);}

  .cal-wrapper{
    width:100%;
    max-width:1100px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 16px 40px -20px rgba(0,0,0,0.4);
    transition:background .25s,border-color .25s;
    flex:1;
    min-height:600px;
    display:flex;
    flex-direction:column;
  }
  .iframe-wrap{
    flex:1;
    padding:16px 24px 0 24px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-height:700px;
  }
  .tradingview-widget-container{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100%;
    min-height:700px;
  }
  .tradingview-widget-container__widget{
    flex:1;
    height:100% !important;
    min-height:700px;
  }
  .cal-footer{
    padding:10px 16px;
    border-top:1px solid var(--border);
    font-size:11px;color:var(--text-dim);
    font-family:var(--mono);letter-spacing:.04em;
    transition:border-color .25s;
  }

  @media(max-width:600px){
    .content{padding:16px 12px 32px;}
    .cal-wrapper{border-radius:10px;min-height:500px;}
    .iframe-wrap{padding:10px 12px 0 12px;}
    .cal-wrapper iframe{min-height:600px;}
  }

  /* ═══ FINTECH NAVY OVERRIDES (allineato a journal.html) ═══ */
  body{letter-spacing:0.005em;-webkit-font-smoothing:antialiased;}
  ::selection{background:rgba(0,214,143,0.3);}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:5px;border:2px solid var(--bg);}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}

  .topbar{
    background:rgba(16,20,31,0.85);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    height:auto;min-height:66px;padding:16px 40px;
    box-shadow:0 10px 30px -18px var(--shadow);
  }
  .brand-title{font-family:var(--sans);font-weight:800;font-size:16px;color:var(--text);letter-spacing:.12em;text-transform:uppercase;}
  .brand-title span{color:var(--accent);}
  .back-btn{
    border-radius:999px;border:1px solid transparent;background:var(--panel-2);
    color:var(--text-dim);font-family:var(--sans);font-weight:700;font-size:12px;
    padding:7px 14px;transition:background .16s var(--ease),color .16s,transform .12s var(--ease);
  }
  .back-btn:hover{background:var(--panel-hover);color:var(--text);border-color:transparent;transform:translateY(-1px);}
  .page-title{font-family:var(--mono);color:var(--text-lo);}

  .info-bar{
    border:1px solid rgba(255,255,255,0.04);
    border-radius:16px;
    font-weight:600;
    box-shadow:0 14px 32px -24px var(--shadow);
  }
  .cal-wrapper{
    border:1px solid rgba(255,255,255,0.04);
    border-radius:24px;
    box-shadow:0 18px 40px -26px var(--shadow);
  }
  .cal-footer{color:var(--text-lo);}

  @media(max-width:600px){
    .topbar{padding:14px 20px;min-height:0;}
    .cal-wrapper{border-radius:16px;}
  }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}
  }

  /* ── BRAND LOCKUP (logo GB Suite + sottotitolo) ── */
  .brand-lockup{display:flex;align-items:center;gap:13px;}
  .brand-mark{
    width:38px;height:38px;border-radius:11px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,#00e69c 0%,#00b478 100%);
    box-shadow:0 8px 20px -8px rgba(0,214,143,.55),inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform .18s cubic-bezier(.22,1,.36,1);
  }
  .brand-mark:hover{transform:translateY(-1px) rotate(-2deg);}
  .brand-mark svg{width:21px;height:21px;stroke:#04140d;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .brand-text{display:flex;flex-direction:column;gap:3px;line-height:1;}
  .brand-text .brand-title{flex:none;line-height:1;margin:0;}
  .brand-sub{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    font-size:9px;font-weight:600;letter-spacing:.24em;
    text-transform:uppercase;color:#5f6b83;white-space:nowrap;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a class="brand-lockup" href="hub.html" style="text-decoration:none;color:inherit;"><div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 15l4-5 4 3 5-7"/><path d="M14 6h5v5"/></svg></div><div class="brand-text"><div class="brand-title">GB <span>SUITE</span></div><div class="brand-sub">Trading hub</div></div></a>
  </div>
  <div class="topbar-right">
    <span class="page-title">Calendario Economico</span>
  </div>
</header>

<div class="content">
  <div class="info-bar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Calendario in tempo reale con eventi economici ad alta e media importanza — USA. Powered by TradingView.
  </div>

  <div class="cal-wrapper">
    <div class="iframe-wrap">
      <div class="tradingview-widget-container" style="height:100%;min-height:700px;">
        <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);min-height:700px;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
{
  "colorTheme": "dark",
  "isTransparent": true,

  "countryFilter": "us",
  "importanceFilter": "0,1",
  "width": "100%",
  "height": "100%"
}
        </script>
      </div>
    </div>
    <div class="cal-footer">Fonte: TradingView · Dati in tempo reale</div>
  </div>
</div>
